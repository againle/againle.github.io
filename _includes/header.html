<header class="site-header">
    <div class="header-wrapper">
        <!-- 左边：名字 -->
        <div class="site-title">
            <a href="{{ '/' | relative_url }}">{{ site.author.name }}</a>
        </div>
        
        <!-- 右边：导航 + 主题切换按钮 -->
        <div class="header-right">
            <nav class="site-nav">
                <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
                <a href="{{ '/research' | relative_url }}" {% if page.url contains '/research' %}class="active"{% endif %}>Research</a>
                <a href="{{ '/publications' | relative_url }}" {% if page.url contains '/publications' %}class="active"{% endif %}>Publications</a>
                <a href="{{ '/projects' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a>
                <a href="{{ '/notebook' | relative_url }}" {% if page.url contains '/notebook' %}class="active"{% endif %}>Notebook</a>
                <a href="{{ '/cv' | relative_url }}" {% if page.url contains '/cv' %}class="active"{% endif %}>CV</a>
                <a href="{{ '/about-me' | relative_url }}" {% if page.url contains '/about-me' %}class="active"{% endif %}>About Me</a>
            </nav>
            
            <!-- 主题切换按钮 -->
            <button id="theme-toggle" class="theme-btn" aria-label="Switch theme">
                <i class="fas fa-palette"></i>
            </button>
        </div>
    </div>
</header>
